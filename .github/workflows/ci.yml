name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: Build, test, and repository health
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Repository health gate
        shell: pwsh
        run: .\scripts\repository-health.ps1

      - name: Restore
        run: dotnet restore .\ProcessBusSuite.sln

      - name: Build
        run: dotnet build .\ProcessBusSuite.sln -c Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Test with coverage
        run: >-
          dotnet test .\ProcessBusSuite.sln
          -c Release
          --no-build
          --logger "trx;LogFileName=tests.trx"
          --results-directory .\TestResults
          --collect "XPlat Code Coverage"

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-evidence-${{ github.run_id }}
          path: TestResults/**
          if-no-files-found: warn
          retention-days: 14
