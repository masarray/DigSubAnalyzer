name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Verify landing page source
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref:        $GITHUB_REF"
          echo "SHA:        $GITHUB_SHA"
          test -f docs/index.html
          test -f docs/styles.css
          test -f docs/app.js
          test -f docs/site.webmanifest
          test -f docs/assets/branding/favicon.ico
          test -f docs/screenshot/analyzer-overview.webp
          echo "Pages source preview:"
          find docs -maxdepth 3 -type f | sort | sed 's#^docs/##' | head -120

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
