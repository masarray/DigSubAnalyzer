name: Release Windows portable package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label, for example 1.4.0-beta.2
        required: true
        default: 1.4.0-beta.2
      publish_release:
        description: Create a new GitHub Release
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark GitHub Release as prerelease
        required: true
        default: true
        type: boolean
      draft:
        description: Create a draft release
        required: true
        default: false
        type: boolean
      release_notes_file:
        description: Markdown file used as release body
        required: true
        default: docs/RELEASE_NOTES_v1.4.0-beta.2.md
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  package:
    name: Validate, sign, attest, and package Windows x64
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Checkout exact release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.4xx

      - name: Install document validation dependencies
        run: python -m pip install --disable-pip-version-check reportlab==4.4.9 pypdf==6.4.1

      - name: Resolve and validate release identity
        id: identity
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) { $version = '${{ github.ref_name }}' }
          $version = $version.Trim()
          if ($version.StartsWith('v')) { $version = $version.Substring(1) }
          if ([string]::IsNullOrWhiteSpace($version)) { throw 'Unable to resolve release version.' }
          $builtCommit = (git rev-parse HEAD).Trim()
          $mainCommit = (git rev-parse origin/main).Trim()
          git merge-base --is-ancestor $builtCommit $mainCommit
          if ($LASTEXITCODE -ne 0) { throw "Release commit $builtCommit is not on main." }
          if ('${{ github.event_name }}' -eq 'push' -and '${{ github.ref_name }}' -ne "v$version") {
            throw "Tag/version mismatch: tag=${{ github.ref_name }}, version=$version"
          }
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "built_commit=$builtCommit" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Require signing secret for a public release
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_release == 'true' }}
        shell: pwsh
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERT) -or [string]::IsNullOrWhiteSpace($env:SIGNING_PASSWORD)) {
            throw 'Public release publishing is blocked until WINDOWS_SIGNING_CERTIFICATE_BASE64 and WINDOWS_SIGNING_CERTIFICATE_PASSWORD are configured.'
          }

      - name: Verify generated PDFs and public wording
        run: |
          python .\scripts\generate-release-pdfs.py --check
          python .\scripts\validate-public-content.py

      - name: Repository health gate
        shell: pwsh
        run: .\scripts\repository-health.ps1 -ExpectedVersion '${{ steps.identity.outputs.version }}'

      - name: Restore, build, and test
        shell: pwsh
        run: |
          dotnet restore .\ProcessBusSuite.sln
          dotnet build .\ProcessBusSuite.sln -c Release --no-restore /p:ContinuousIntegrationBuild=true
          dotnet test .\ProcessBusSuite.sln -c Release --no-build --logger "trx;LogFileName=release-tests.trx" --results-directory .\TestResults

      - name: Publish portable package
        shell: pwsh
        env:
          SOURCE_HEAD_COMMIT: ${{ steps.identity.outputs.built_commit }}
          TESTED_MERGE_COMMIT: ${{ steps.identity.outputs.built_commit }}
          SOURCE_REF: ${{ github.ref_name }}
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: .\scripts\publish-windows-portable.ps1 -Version '${{ steps.identity.outputs.version }}' -Configuration Release -Runtime win-x64

      - name: Verify package and signature boundary
        shell: pwsh
        run: |
          $zip = ".\artifacts\release\ProcessBusInsight-v${{ steps.identity.outputs.version }}-win-x64-portable.zip"
          $requireSignature = '${{ github.event_name }}' -eq 'push' -or '${{ github.event.inputs.publish_release }}' -eq 'true'
          if ($requireSignature) {
            .\scripts\verify-release-package.ps1 -PackageZip $zip -ExpectedVersion '${{ steps.identity.outputs.version }}' -RequireAuthenticode
          } else {
            .\scripts\verify-release-package.ps1 -PackageZip $zip -ExpectedVersion '${{ steps.identity.outputs.version }}'
          }

      - name: Create release manifest
        shell: pwsh
        run: |
          $zip = "artifacts/release/ProcessBusInsight-v${{ steps.identity.outputs.version }}-win-x64-portable.zip"
          $sbom = 'artifacts/release/ProcessBusInsight-SBOM.cdx.json'
          $source = 'artifacts/release/SOURCE.md'
          $manifest = [ordered]@{
            product = 'Process Bus Insight'
            version = '${{ steps.identity.outputs.version }}'
            builtCommit = '${{ steps.identity.outputs.built_commit }}'
            sourceHeadCommit = '${{ steps.identity.outputs.built_commit }}'
            testedMergeCommit = '${{ steps.identity.outputs.built_commit }}'
            sourceRef = '${{ github.ref_name }}'
            runtime = 'win-x64'
            framework = 'net8.0-windows'
            communityLicense = 'GPL-3.0-or-later'
            historicalBoundary = '85d43a0fe58a5888a9e8008c168ab76d2333ea87'
            sourceArchive = "https://github.com/masarray/DigSubAnalyzer/archive/${{ steps.identity.outputs.built_commit }}.zip"
            packageSha256 = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
            sbomSha256 = (Get-FileHash $sbom -Algorithm SHA256).Hash.ToLowerInvariant()
            sourceOfferSha256 = (Get-FileHash $source -Algorithm SHA256).Hash.ToLowerInvariant()
            timestampUtc = (Get-Date).ToUniversalTime().ToString('o')
          }
          $manifest | ConvertTo-Json | Set-Content .\artifacts\release\release-manifest.json -Encoding utf8

      - name: Attest release package provenance
        id: attest-package
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: artifacts/release/ProcessBusInsight-v${{ steps.identity.outputs.version }}-win-x64-portable.zip

      - name: Attest SBOM provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: artifacts/release/ProcessBusInsight-SBOM.cdx.json

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ProcessBusInsight-v${{ steps.identity.outputs.version }}-win-x64-portable
          path: |
            artifacts/release/ProcessBusInsight-v${{ steps.identity.outputs.version }}-win-x64-portable.zip
            artifacts/release/SHA256SUMS.txt
            artifacts/release/SOURCE.md
            artifacts/release/ProcessBusInsight-SBOM.cdx.json
            artifacts/release/release-manifest.json
            TestResults/**
          if-no-files-found: error
          retention-days: 30

      - name: Publish new GitHub Release
        if: ${{ github.event_name == 'push' || github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ steps.identity.outputs.version }}
          target_commitish: ${{ steps.identity.outputs.built_commit }}
          name: Process Bus Insight v${{ steps.identity.outputs.version }}
          body_path: ${{ github.event.inputs.release_notes_file || 'docs/RELEASE_NOTES_v1.4.0-beta.2.md' }}
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event_name == 'push' && contains(steps.identity.outputs.version, '-') || github.event.inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/release/ProcessBusInsight-v${{ steps.identity.outputs.version }}-win-x64-portable.zip
            artifacts/release/SHA256SUMS.txt
            artifacts/release/SOURCE.md
            artifacts/release/ProcessBusInsight-SBOM.cdx.json
            artifacts/release/release-manifest.json
